<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>AI Chat</span>
        </div>
        <button class="new-chat-btn" onclick="newChat()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Chat
        </button>
      </div>
      <div class="chat-history" id="chatHistory"></div>
      <div class="sidebar-footer">
        <div class="api-key-section">
          <label>OpenAI API Key</label>
          <input type="password" id="apiKeyInput" placeholder="sk-..." />
          <button onclick="saveApiKey()">Save</button>
        </div>
        <p class="footer-note">Your key is stored locally only.</p>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat-area">
      <div class="chat-header">
        <span id="chatTitle">New Conversation</span>
        <div class="model-select">
          <select id="modelSelect">
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
          </select>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="welcome">
          <div class="welcome-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"/>
              <path d="M12 6a1 1 0 0 0-1 1v5a1 1 0 0 0 .293.707l3 3a1 1 0 0 0 1.414-1.414L13 11.586V7a1 1 0 0 0-1-1z"/>
            </svg>
          </div>
          <h2>How can I help you today?</h2>
          <p>Enter your OpenAI API key in the sidebar to get started.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="useSuggestion('Explain quantum computing in simple terms')">U0001f9ea Explain quantum computing</button>
            <button class="suggestion" onclick="useSuggestion('Write a Python function to sort a list')">U0001f40d Write Python code</button>
            <button class="suggestion" onclick="useSuggestion('What are the best practices for REST APIs?')">U0001f310 REST API best practices</button>
            <button class="suggestion" onclick="useSuggestion('Create a workout plan for beginners')">U0001f4aa Create a workout plan</button>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-box">
          <textarea
            id="userInput"
            placeholder="Message AI Chat..."
            rows="1"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
        <p class="disclaimer">AI can make mistakes. Verify important information.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
